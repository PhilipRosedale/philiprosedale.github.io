<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FairShare - Group Currency</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #3a7ca5;
            --secondary-color: #2f6690;
            --accent-color: #16425b;
            --text-color: #333;
            --light-gray: #f5f5f5;
            --medium-gray: #e0e0e0;
            --dark-gray: #666;
            --white: #fff;
            --green: #28a745;
            --red: #dc3545;
            --yellow: #ffc107;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--light-gray);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background-color: var(--primary-color);
            color: var(--white);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
        }
        .header h1 { font-size: 1.5rem; font-weight: 700; }
        .header h1 a { color: var(--white); text-decoration: none; }
        .header-right { display: flex; align-items: center; gap: 1rem; }
        .header .user-name { font-size: 0.9rem; opacity: 0.9; }

        /* Buttons */
        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn:hover { transform: translateY(-1px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-primary { background: var(--primary-color); color: var(--white); }
        .btn-primary:hover:not(:disabled) { background: var(--accent-color); }
        .btn-secondary { background: var(--medium-gray); color: var(--text-color); }
        .btn-secondary:hover:not(:disabled) { background: #ccc; }
        .btn-success { background: var(--green); color: var(--white); }
        .btn-success:hover:not(:disabled) { background: #218838; }
        .btn-danger { background: var(--red); color: var(--white); }
        .btn-danger:hover:not(:disabled) { background: #c82333; }
        .btn-small { padding: 0.3rem 0.7rem; font-size: 0.8rem; }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
        }
        .btn-outline:hover:not(:disabled) {
            background: var(--primary-color);
            color: var(--white);
        }

        /* Main content */
        .main-content {
            max-width: 700px;
            margin: 0 auto;
            padding: 2rem;
            min-height: calc(100vh - 60px);
        }

        /* Groups screen */
        .group-card {
            background: var(--white);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: var(--shadow);
            margin-bottom: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .group-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        .group-card .group-card-name { font-weight: 600; font-size: 1rem; }
        .group-card .group-card-meta { font-size: 0.85rem; color: var(--dark-gray); }
        .group-card .group-card-status {
            display: inline-block;
            font-size: 0.7rem;
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
            margin-left: 0.5rem;
            background: var(--yellow);
            color: #333;
        }
        .group-card .group-card-arrow {
            font-size: 1.2rem;
            color: var(--dark-gray);
        }

        /* Clickable group name header */
        .group-name-link {
            cursor: pointer;
            transition: opacity 0.2s ease;
        }
        .group-name-link:hover { opacity: 0.8; }
        .group-name-back {
            font-size: 0.9rem;
            opacity: 0.7;
            font-weight: 400;
            margin-bottom: 0.2rem;
        }

        /* Auth screen */
        .auth-container {
            max-width: 400px;
            margin: 3rem auto;
            background: var(--white);
            padding: 2.5rem;
            border-radius: 8px;
            box-shadow: var(--shadow);
        }
        .auth-container h2 {
            text-align: center;
            margin-bottom: 0.5rem;
            color: var(--accent-color);
        }
        .auth-container .subtitle {
            text-align: center;
            color: var(--dark-gray);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        .auth-tabs {
            display: flex;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--medium-gray);
        }
        .auth-tab {
            flex: 1;
            padding: 0.7rem;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: var(--dark-gray);
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: var(--transition);
        }
        .auth-tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        /* Forms */
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
            color: var(--accent-color);
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1px solid var(--medium-gray);
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9rem;
            transition: var(--transition);
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(58, 124, 165, 0.15);
        }
        .form-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1.5rem;
        }
        .form-actions .btn { flex: 1; }

        /* Cards */
        .card {
            background: var(--white);
            border-radius: 8px;
            box-shadow: var(--shadow);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .card h3 {
            font-size: 1.1rem;
            color: var(--accent-color);
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--light-gray);
        }

        /* Balance display */
        .balance-card {
            text-align: center;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: var(--white);
        }
        .balance-card h3 { color: rgba(255,255,255,0.8); border-bottom-color: rgba(255,255,255,0.2); }
        .balance-amount {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0.5rem 0;
        }
        .balance-currency { font-size: 0.9rem; opacity: 0.8; }

        /* Tab bar */
        .tab-bar {
            display: flex;
            margin-bottom: 0;
            border-bottom: 2px solid var(--medium-gray);
            background: var(--white);
            border-radius: 8px 8px 0 0;
            box-shadow: var(--shadow);
        }
        .tab-btn {
            flex: 1;
            padding: 0.8rem 1rem;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--dark-gray);
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }
        .tab-btn:hover { color: var(--primary-color); background: #f0f7fb; }
        .tab-btn.active { color: var(--primary-color); border-bottom-color: var(--primary-color); }
        .tab-btn .tab-icon { font-size: 1.1rem; }

        /* Tab content card (attached to tab bar, no top radius) */
        .tab-content-card {
            background: var(--white);
            border-radius: 0 0 8px 8px;
            box-shadow: var(--shadow);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        /* Group info bar (used inside money tab) */
        .group-info-bar {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .info-item {
            background: var(--light-gray);
            padding: 0.8rem 1.2rem;
            border-radius: 8px;
            text-align: center;
            min-width: 120px;
        }
        .info-item .info-label { font-size: 0.75rem; color: var(--dark-gray); text-transform: uppercase; letter-spacing: 0.05em; }
        .info-item .info-value { font-size: 1.2rem; font-weight: 700; color: var(--accent-color); }
        .info-item .info-my-vote { font-size: 0.75rem; color: var(--primary-color); font-weight: 600; margin-top: 2px; }
        .info-item .info-vote-link {
            font-size: 0.7rem; color: var(--accent-color); cursor: pointer;
            margin-top: 3px; text-decoration: underline; font-weight: 600;
        }
        .info-item .info-vote-link:hover { color: var(--primary-color); }

        /* Transaction list */
        .tx-list { list-style: none; }
        .tx-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.7rem 0;
            border-bottom: 1px solid var(--light-gray);
        }
        .tx-item:last-child { border-bottom: none; }
        .tx-info .tx-parties { font-weight: 500; font-size: 0.9rem; }
        .tx-info .tx-memo { font-size: 0.8rem; color: var(--dark-gray); }
        .tx-info .tx-date { font-size: 0.75rem; color: var(--dark-gray); }
        .tx-amount { font-weight: 700; font-size: 0.95rem; }
        .tx-amount.sent { color: var(--red); }
        .tx-amount.received { color: var(--green); }

        /* Members list */
        .member-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 0;
            border-bottom: 1px solid var(--light-gray);
        }
        .member-item:last-child { border-bottom: none; }
        .member-name { font-weight: 500; }
        .member-status {
            font-size: 0.75rem;
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
        }
        .member-status.active { background: #d4edda; color: #155724; }
        .member-status.pending { background: #fff3cd; color: #856404; }
        .member-sponsor { font-size: 0.8rem; color: var(--dark-gray); font-style: italic; }

        /* Modal overlay */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal {
            background: var(--white);
            border-radius: 8px;
            padding: 2rem;
            width: 90%;
            max-width: 450px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .modal.modal-wide { max-width: 650px; }
        .modal h3 {
            color: var(--accent-color);
            margin-bottom: 1.5rem;
        }

        /* Notification toast */
        .toast {
            position: fixed;
            top: 1rem;
            right: 1rem;
            padding: 0.8rem 1.2rem;
            border-radius: 6px;
            color: var(--white);
            font-weight: 500;
            font-size: 0.9rem;
            z-index: 2000;
            animation: slideIn 0.3s ease-out;
            max-width: 350px;
        }
        .toast.success { background: var(--green); }
        .toast.error { background: var(--red); }
        .toast.info { background: var(--primary-color); }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-content { padding: 1rem; }
            .balance-amount { font-size: 2rem; }
            .tab-btn { font-size: 0.8rem; padding: 0.6rem 0.5rem; }
        }

        /* Constitution / Diff styles */
        .constitution-text {
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            line-height: 1.8;
            white-space: pre-wrap;
            padding: 1rem;
            background: var(--light-gray);
            border-radius: 6px;
            border: 1px solid var(--medium-gray);
        }
        .constitution-text .tag {
            background: #e3f0f8;
            color: var(--primary-color);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            margin-left: 0.3rem;
        }
        .diff-display {
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            line-height: 1.8;
            white-space: pre-wrap;
            padding: 1rem;
            background: var(--light-gray);
            border-radius: 6px;
            border: 1px solid var(--medium-gray);
        }
        .diff-display ins {
            background: #d4edda;
            color: #155724;
            text-decoration: none;
            padding: 0.1rem 0.2rem;
            border-radius: 3px;
        }
        .diff-display del {
            background: #f8d7da;
            color: #721c24;
            text-decoration: line-through;
            padding: 0.1rem 0.2rem;
            border-radius: 3px;
        }
        .amendment-card {
            border: 1px solid var(--medium-gray);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            background: var(--white);
        }
        .amendment-card.voting { border-left: 4px solid var(--primary-color); }
        .amendment-card.passed { border-left: 4px solid var(--green); }
        .amendment-card.failed { border-left: 4px solid var(--red); }
        .amendment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .amendment-title { font-weight: 600; font-size: 0.95rem; }
        .amendment-meta { font-size: 0.8rem; color: var(--dark-gray); }
        .amendment-status {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
        }
        .amendment-status.voting { background: #cce5ff; color: #004085; }
        .amendment-status.passed { background: #d4edda; color: #155724; }
        .amendment-status.failed { background: #f8d7da; color: #721c24; }
        .vote-bar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0.5rem 0;
        }
        .vote-bar-track {
            flex: 1;
            height: 8px;
            background: var(--medium-gray);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }
        .vote-bar-fill {
            height: 100%;
            background: var(--green);
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        .vote-bar-threshold {
            position: absolute;
            top: -3px;
            height: 14px;
            width: 2px;
            background: var(--red);
        }

        /* Activity log */
        .activity-item {
            display: flex;
            gap: 0.75rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--light-gray);
            font-size: 0.85rem;
            align-items: baseline;
        }
        .activity-item:last-child { border-bottom: none; }
        .activity-time {
            flex-shrink: 0;
            font-size: 0.75rem;
            color: var(--dark-gray);
            min-width: 70px;
        }
        .activity-summary { color: var(--text-color); }
        .activity-item.highlight {
            animation: activityHighlight 2s ease-out;
        }
        @keyframes activityHighlight {
            from { background-color: #e3f0f8; }
            to { background-color: transparent; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<!-- ===== HEADER ===== -->
<div class="header">
    <h1><a href="index.html">FairShare</a></h1>
    <div class="header-right">
        <span class="user-name" id="userDisplay"></span>
        <button class="btn btn-outline hidden" id="logoutBtn" style="border-color: rgba(255,255,255,0.5); color: var(--white);" onclick="logout()">Log Out</button>
    </div>
</div>

<!-- ===== AUTH SCREEN ===== -->
<div id="authScreen" class="auth-container">
    <h2>FairShare</h2>
    <p class="subtitle">Group currency for everyone</p>

    <!-- Invite banner (shown when arriving via invite link) -->
    <div id="inviteBanner" class="hidden" style="background:linear-gradient(135deg,#e3f0f8,#d4e8f5);border-radius:8px;padding:1rem;margin-bottom:1.5rem;border-left:4px solid var(--primary-color);">
        <div id="inviteBannerText" style="font-size:0.9rem;color:var(--accent-color);line-height:1.5;"></div>
    </div>

    <div class="auth-tabs">
        <div class="auth-tab active" data-tab="login" onclick="switchAuthTab('login')">Log In</div>
        <div class="auth-tab" data-tab="signup" onclick="switchAuthTab('signup')">Sign Up</div>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" required placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" required placeholder="Your password" minlength="6">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Log In</button>
        </div>
    </form>

    <form id="signupForm" class="hidden" onsubmit="handleSignup(event)">
        <div class="form-group">
            <label>Display Name</label>
            <input type="text" id="signupName" required placeholder="How others will see you" minlength="2">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="signupEmail" required placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="signupPassword" required placeholder="At least 6 characters" minlength="6">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-success">Create Account</button>
        </div>
    </form>
</div>

<!-- ===== APP (hidden until logged in) ===== -->
<div id="appScreen" class="hidden">
    <div class="main-content">

        <!-- My Groups screen (full-page list) -->
        <div id="groupsScreen">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
                <h2 style="color:var(--accent-color);">My Groups</h2>
                <button class="btn btn-primary" onclick="showModal('createGroup')">+ Create Group</button>
            </div>
            <div id="groupList">
                <!-- Populated dynamically -->
            </div>
            <p id="groupsEmptyHint" class="hidden" style="text-align:center;color:var(--dark-gray);margin-top:2rem;">
                Create a new group to get started, or ask an existing member to sponsor you.
            </p>
        </div>

        <!-- Group view (hidden until group selected) -->
        <div id="groupView" class="hidden">
            <!-- Group name header — click to go back to groups list -->
            <div class="card balance-card group-name-link" onclick="showGroupsList()">
                <div class="group-name-back">&#8592; My Groups</div>
                <div class="balance-amount" id="groupNameDisplay"></div>
            </div>

            <!-- Tab bar -->
            <div class="tab-bar" id="tabBar">
                <button class="tab-btn active" data-tab="money" onclick="switchTab('money')">
                    <span class="tab-icon">💲</span> Money
                </button>
                <button class="tab-btn" data-tab="members" onclick="switchTab('members')">
                    <span class="tab-icon">👥</span> Members
                </button>
                <button class="tab-btn" data-tab="constitution" onclick="switchTab('constitution')">
                    <span class="tab-icon">📜</span> Constitution
                </button>
            </div>

            <!-- Tab content -->
            <div class="tab-content-card" id="tabContent">
                <!-- Populated dynamically per active tab -->
            </div>

            <!-- Activity log (always visible below tabs) -->
            <div class="card" id="activityLog">
                <h3>Activity</h3>
                <div id="activityContent">
                    <!-- Populated dynamically -->
                </div>
            </div>
        </div>

    </div>
</div>

<!-- ===== MODAL CONTAINER ===== -->
<div id="modalOverlay" class="modal-overlay hidden" onclick="if(event.target===this)closeModal()">
    <div class="modal" id="modalBody">
        <!-- Populated dynamically per modal type -->
    </div>
</div>

<!-- ===== SUPABASE SDK ===== -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
// ============================================================
// CONFIG - Replace these with your Supabase project values
// ============================================================
const SUPABASE_URL = 'https://vdpqgmrfvlaieqpvpdcr.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkcHFnbXJmdmxhaWVxcHZwZGNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2MjUzNjcsImV4cCI6MjA4NzIwMTM2N30.ORvkYqcrDjnhdpCvXaIBzjRLyzi3WSIqMmIxWecpgl8';

let db;
try {
    db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
} catch (e) {
    console.error('Failed to initialize Supabase client:', e);
}

// ============================================================
// STATE
// ============================================================
let currentUser = null;
let currentProfile = null;
let selectedGroup = null;
let myGroups = [];
let groupChannel = null; // Supabase Realtime channel for current group
let activeTab = 'money'; // Current tab: 'money', 'members', 'constitution'

// ============================================================
// INIT
// ============================================================
async function init() {
    if (!db) {
        showToast('Could not connect to database. Check Supabase config.', 'error');
        showAuth();
        return;
    }

    // Check for invite token in URL
    const urlParams = new URLSearchParams(window.location.search);
    const inviteToken = urlParams.get('invite');
    if (inviteToken) {
        sessionStorage.setItem('fairshare_invite', inviteToken);
        await showInviteBanner(inviteToken);
    }

    try {
        const { data: { session } } = await db.auth.getSession();
        if (session) {
            currentUser = session.user;
            await loadProfile();
            const claimedGroup = await handlePendingInvite();
            showApp(claimedGroup);
        } else {
            showAuth();
        }

        // Listen for auth changes
        db.auth.onAuthStateChange(async (event, session) => {
            if (event === 'SIGNED_IN' && session) {
                currentUser = session.user;
                await loadProfile();
                const claimedGroup = await handlePendingInvite();
                showApp(claimedGroup);
            } else if (event === 'SIGNED_OUT') {
                currentUser = null;
                currentProfile = null;
                showAuth();
            }
        });
    } catch (e) {
        console.error('Init error:', e);
        showToast('Connection error: ' + e.message, 'error');
        showAuth();
    }
}

// Show invite banner on the auth screen
async function showInviteBanner(token) {
    try {
        const { data, error } = await db.rpc('get_sponsorship_by_token', { p_token: token });
        if (error || data?.error) {
            const msg = data?.error || error?.message || 'Invalid invitation';
            document.getElementById('inviteBannerText').innerHTML =
                `<strong>Invitation issue:</strong> ${esc(msg)}`;
            document.getElementById('inviteBanner').classList.remove('hidden');
            sessionStorage.removeItem('fairshare_invite');
            return;
        }

        document.getElementById('inviteBannerText').innerHTML =
            `<strong>${esc(data.sponsor_name)}</strong> is offering to sponsor your candidacy for ` +
            `<strong>${esc(data.group_name)}</strong>.` +
            (data.message ? `<br><em style="color:var(--dark-gray);">"${esc(data.message)}"</em>` : '') +
            `<br><br>If you haven't yet created an account, start by making one.`;
        document.getElementById('inviteBanner').classList.remove('hidden');

        // Default to sign-up tab for new users arriving via invite
        switchAuthTab('signup');
    } catch (e) {
        console.error('Failed to load invite details:', e);
    }
}

// Claim a pending invite after the user has signed in
// Returns the group_id if successfully claimed, so the caller can navigate there
async function handlePendingInvite() {
    const token = sessionStorage.getItem('fairshare_invite');
    if (!token) return null;

    let claimedGroupId = null;
    try {
        const { data, error } = await db.rpc('claim_sponsorship', { p_token: token });
        if (error) {
            showToast('Invite: ' + error.message, 'error');
        } else if (data?.success) {
            claimedGroupId = data.group_id;
            if (data.admitted) {
                showToast(`Welcome to "${data.group_name}"! You've been admitted as a member.`, 'success');
            } else {
                showToast(`You've been sponsored to join "${data.group_name}"! Awaiting group endorsement.`, 'success');
            }
        }
    } catch (e) {
        console.error('Failed to claim sponsorship:', e);
    }

    // Always clear the stored token (used or failed)
    sessionStorage.removeItem('fairshare_invite');

    // Clean the URL
    if (window.location.search.includes('invite=')) {
        const cleanUrl = window.location.pathname;
        window.history.replaceState({}, document.title, cleanUrl);
    }

    // Hide the invite banner
    document.getElementById('inviteBanner').classList.add('hidden');
    return claimedGroupId;
}

function switchAuthTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
    document.getElementById('signupForm').classList.toggle('hidden', tab !== 'signup');
}

async function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;

    const { error } = await db.auth.signInWithPassword({ email, password });
    if (error) {
        showToast(error.message, 'error');
    }
}

async function handleSignup(e) {
    e.preventDefault();
    const name = document.getElementById('signupName').value;
    const email = document.getElementById('signupEmail').value;
    const password = document.getElementById('signupPassword').value;

    const { error } = await db.auth.signUp({
        email,
        password,
        options: { data: { display_name: name } }
    });

    } else {

async function logout() {
    // Clean up realtime subscription
    if (groupChannel) {
        db.removeChannel(groupChannel);
        groupChannel = null;
    }
    // Reset client state
    selectedGroup = null;
    myGroups = [];
    currentUser = null;
    currentProfile = null;

    try {
        await db.auth.signOut();
    } catch (e) {
        console.warn('signOut error (ignored):', e);
    }
    // Always return to auth screen, even if signOut failed
    showAuth();
}

function showAuth() {
    document.getElementById('authScreen').classList.remove('hidden');
    document.getElementById('appScreen').classList.add('hidden');
    document.getElementById('logoutBtn').classList.add('hidden');
    document.getElementById('userDisplay').textContent = '';
}

async function showApp(navigateToGroupId) {
    document.getElementById('authScreen').classList.add('hidden');
    document.getElementById('appScreen').classList.remove('hidden');
    document.getElementById('logoutBtn').classList.remove('hidden');

// ============================================================
// GROUPS
// ============================================================
async function loadMyGroups(autoNavigateGroupId) {
    const { data, error } = await db
        .from('members')
        .select('*, groups(*)')
        .eq('user_id', currentUser.id)
        .in('status', ['active', 'pending']);

    if (error) { showToast('Failed to load groups', 'error'); return; }
    myGroups = data || [];

    // Fetch member counts for each group
    const groupIds = myGroups.map(m => m.group_id);
    if (groupIds.length > 0) {
        const { data: counts } = await db
            .from('members')
            .select('group_id')
            .in('group_id', groupIds)
            .eq('status', 'active');
        const countMap = {};
        (counts || []).forEach(r => { countMap[r.group_id] = (countMap[r.group_id] || 0) + 1; });
        myGroups.forEach(m => { m._memberCount = countMap[m.group_id] || 0; });
    }

    renderGroupList();

    // If a specific group was requested (e.g. from sponsorship), navigate there
    if (autoNavigateGroupId) {
        const target = myGroups.find(m => m.group_id === autoNavigateGroupId);
        if (target) { selectGroup(target.groups, target); return; }
    }

    // Re-select current group if still valid, or restore last viewed group
    if (selectedGroup) {
        const still = myGroups.find(m => m.group_id === selectedGroup.id);
        if (still) {
            selectGroup(still.groups, still);
        } else {
            selectedGroup = null;
            showGroupsList();
        }
    } else if (currentProfile?.last_group_id) {
        const last = myGroups.find(m => m.group_id === currentProfile.last_group_id);
        if (last) {
            selectGroup(last.groups, last);
        } else {
            showGroupsList();
        }
    } else {
        showGroupsList();
    }
}

function renderGroupList() {
    const el = document.getElementById('groupList');
    const hint = document.getElementById('groupsEmptyHint');
    if (myGroups.length === 0) {
        el.innerHTML = '';
        hint.classList.remove('hidden');
        return;
    }
    hint.classList.add('hidden');
    el.innerHTML = myGroups.map(m => `
        <div class="group-card" onclick="selectGroupById('${m.group_id}')">
            <div>
                <div class="group-card-name">
                    ${esc(m.groups.name)}
                    ${m.status === 'pending' ? '<span class="group-card-status">pending</span>' : ''}
                </div>
                <div class="group-card-meta">${m._memberCount || 0} member${m._memberCount === 1 ? '' : 's'}</div>
            </div>
            <div class="group-card-arrow">›</div>
        </div>
    `).join('');
}

function selectGroupById(groupId) {
    const membership = myGroups.find(m => m.group_id === groupId);
    if (membership) selectGroup(membership.groups, membership);
}

async function selectGroup(group, membership) {
    selectedGroup = group;
    document.getElementById('groupsScreen').classList.add('hidden');
    document.getElementById('groupView').classList.remove('hidden');

    // Remember this group for next visit
    if (currentProfile?.last_group_id !== group.id) {
        currentProfile.last_group_id = group.id;
        db.from('profiles').update({ last_group_id: group.id }).eq('id', currentUser.id).then();
    }

    // Subscribe to realtime events for this group
    subscribeToGroup(group.id);

    // Show group name at top
    document.getElementById('groupNameDisplay').textContent = group.name;

    if (membership.status === 'pending') {
        document.getElementById('tabBar').classList.add('hidden');
        document.getElementById('tabContent').innerHTML =
            '<p style="color:var(--dark-gray);padding:1rem;">Your candidacy is being reviewed by the group members. ' +
            'You will gain access once enough members have endorsed you.</p>';
        document.getElementById('activityLog').classList.add('hidden');
        return;
    }

    document.getElementById('tabBar').classList.remove('hidden');
    document.getElementById('activityLog').classList.remove('hidden');

    // Render current tab
    await switchTab(activeTab);

    // Claim daily income if 24h+ since last claim
    if (membership.status === 'active' && Number(group.daily_income) > 0) {
        try {
            const { data: incomeResult } = await db.rpc('claim_daily_income', { p_group_id: group.id });
            if (incomeResult?.claimed) {
                membership.balance = Number(membership.balance) + Number(incomeResult.amount);
                const balEl = document.getElementById('balanceAmount');
                if (balEl) balEl.textContent =
                    `${group.currency_symbol} ${Number(incomeResult.new_balance).toFixed(2)}`;
                showToast(`Daily income: +${group.currency_symbol} ${Number(incomeResult.amount).toFixed(2)}`, 'success');
            }
        } catch (e) {
            console.error('Daily income claim error:', e);
        }
    }

    await loadActivityLog();
}

function showGroupsList() {
    document.getElementById('groupsScreen').classList.remove('hidden');
    document.getElementById('groupView').classList.add('hidden');
    selectedGroup = null;
    // Unsubscribe from realtime when leaving a group
    if (groupChannel) {
        db.removeChannel(groupChannel);
        groupChannel = null;
    }
    renderGroupList();
}

// TRANSACTIONS
// ============================================================
async function loadTransactions() {
    if (!selectedGroup) return;

    const { data, error } = await db
        .from('transactions')
        .select('*, sender:profiles!transactions_from_user_fkey(display_name), receiver:profiles!transactions_to_user_fkey(display_name)')
        .eq('group_id', selectedGroup.id)
        .order('created_at', { ascending: false })
        .limit(20);

    const txEl = document.getElementById('transactionsContent');
    if (!txEl) return;
    if (error || !data || data.length === 0) {
        txEl.innerHTML = '<p style="color:var(--dark-gray);">No transactions yet.</p>';
        return;
    }

    txEl.innerHTML = `<ul class="tx-list">
        ${data.map(tx => {
            const isMinted = tx.from_user === null;
            const isSender = !isMinted && tx.from_user === currentUser.id;
            const fromLabel = isMinted ? '&#x1F331; Daily Income' : esc(tx.sender?.display_name || '?');
            return `<li class="tx-item">
                <div class="tx-info">
                    <div class="tx-parties">${fromLabel} &rarr; ${esc(tx.receiver?.display_name || '?')}</div>
                    ${tx.memo && !isMinted ? `<div class="tx-memo">${esc(tx.memo)}</div>` : ''}
                    <div class="tx-date">${new Date(tx.created_at).toLocaleString()}</div>
                </div>
                <div class="tx-amount ${isSender ? 'sent' : 'received'}">
                    ${isSender ? '-' : '+'}${selectedGroup.currency_symbol} ${Number(tx.amount).toFixed(2)}
                    ${tx.fee > 0 ? `<div style="font-size:0.7rem;color:var(--dark-gray);">fee: ${Number(tx.fee).toFixed(2)}</div>` : ''}
                </div>
            </li>`;
        }).join('')}
    </ul>`;
}

// ============================================================
// MEMBERS
// ============================================================
async function loadMembersList() {
    if (!selectedGroup) return;
    const el = document.getElementById('membersListContent');
    if (!el) return;

    const [{ data, error }, { data: sponsorships }] = await Promise.all([
        db.from('members')
            .select('*, profiles(display_name)')
            .eq('group_id', selectedGroup.id)
            .eq('status', 'active')
            .order('joined_at', { ascending: true }),
        db.from('sponsorships')
            .select('candidate_id, sponsor:profiles!sponsorships_sponsor_id_fkey(display_name)')
            .eq('group_id', selectedGroup.id)
            .eq('status', 'claimed')
    ]);

    if (error || !data) {
        el.innerHTML = '<p>Failed to load members.</p>';
        return;
    }

    // Update member count display
    const countEl = document.getElementById('memberCountDisplay');
    if (countEl) countEl.textContent = `${data.length} active member${data.length === 1 ? '' : 's'}`;

    // Build a map of candidate_id → sponsor name
    const sponsorMap = {};
    (sponsorships || []).forEach(s => {
        if (s.candidate_id) sponsorMap[s.candidate_id] = s.sponsor?.display_name || null;
    });

    el.innerHTML = data.map(m => {
        const sponsor = sponsorMap[m.user_id];
        const isCreator = m.user_id === selectedGroup.created_by;
        const sponsorLabel = isCreator ? 'founder' : (sponsor ? `sponsored by ${esc(sponsor)}` : '');
        return `<div class="member-item">
            <span class="member-name">${esc(m.profiles?.display_name || 'Unknown')}</span>
            ${sponsorLabel ? `<span class="member-sponsor">${sponsorLabel}</span>` : ''}
        </div>`;
    }).join('');
}

// ============================================================
// CANDIDATES (Endorsement)
// ============================================================
async function loadCandidatesList() {
    if (!selectedGroup) return;
    const el = document.getElementById('candidatesContent');
    if (!el) return;

    const { data: candidates, error } = await db
        .from('members')
        .select('*, profiles(display_name)')
        .eq('group_id', selectedGroup.id)
        .eq('status', 'pending');

    if (error || !candidates || candidates.length === 0) {
        el.innerHTML = '<p style="color:var(--dark-gray);">No pending candidates.</p>';
        return;
    }

    // Get endorsement counts
    const { data: endorsements } = await db
        .from('endorsements')
        .select('candidate_id, endorser_id')
        .eq('group_id', selectedGroup.id);

    const endorseMap = {};
    const myEndorsements = new Set();
    (endorsements || []).forEach(e => {
        endorseMap[e.candidate_id] = (endorseMap[e.candidate_id] || 0) + 1;
        if (e.endorser_id === currentUser.id) myEndorsements.add(e.candidate_id);
    });

    // Get sponsorship info for each candidate (sponsor name + message)
    const candidateIds = candidates.map(c => c.user_id);
    const { data: sponsorships } = await db
        .from('sponsorships')
        .select('candidate_id, message, sponsor:profiles!sponsorships_sponsor_id_fkey(display_name)')
        .eq('group_id', selectedGroup.id)
        .eq('status', 'claimed')
        .in('candidate_id', candidateIds);

    const sponsorMap = {};
    (sponsorships || []).forEach(s => {
        sponsorMap[s.candidate_id] = {
            sponsor_name: s.sponsor?.display_name || 'Unknown',
            message: s.message
        };
    });

    const { count: activeCount } = await db
        .from('members')
        .select('*', { count: 'exact', head: true })
        .eq('group_id', selectedGroup.id)
        .eq('status', 'active');

    const memberPct = parseNewMemberThreshold(selectedGroup.constitution);
    const threshold = Math.max(1, Math.ceil((activeCount || 0) * memberPct));

    el.innerHTML = candidates.map(c => {
        const endorsed = myEndorsements.has(c.user_id);
        const count = endorseMap[c.user_id] || 0;
        const sponsorInfo = sponsorMap[c.user_id];
        return `<div class="member-item" style="flex-direction:column;align-items:stretch;gap:0.5rem;">
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <div>
                    <span class="member-name">${esc(c.profiles?.display_name || 'Unknown')}</span>
                    <span style="font-size:0.8rem;color:var(--dark-gray);margin-left:0.5rem;">${count}/${threshold} endorsements</span>
                </div>
                <div>
                    ${endorsed
                        ? `<button class="btn btn-danger btn-small" onclick="unendorse('${c.user_id}')">Unendorse</button>`
                        : `<button class="btn btn-success btn-small" onclick="endorse('${c.user_id}')">Endorse</button>`
                    }
                </div>
            </div>
            ${sponsorInfo ? `
                <div style="font-size:0.8rem;color:var(--dark-gray);padding-left:0.5rem;border-left:3px solid var(--medium-gray);">
                    Sponsored by <strong>${esc(sponsorInfo.sponsor_name)}</strong>
                    ${sponsorInfo.message ? `<br><em>"${esc(sponsorInfo.message)}"</em>` : ''}
                </div>
            ` : ''}
        </div>`;
    }).join('');
}

async function endorse(candidateId) {
    const { error } = await db.from('endorsements').insert({
        group_id: selectedGroup.id,
        candidate_id: candidateId,
        endorser_id: currentUser.id
    });
    if (error) { showToast(error.message, 'error'); return; }

    // Check if threshold met
    const { data } = await db.rpc('check_endorsements', {
        p_group_id: selectedGroup.id,
        p_candidate_id: candidateId
    });
    if (data?.admitted) {
        showToast('Candidate admitted to the group!', 'success');
        await loadMyGroups();
    } else {
        showToast('Endorsement recorded', 'info');
    }
    await loadCandidatesList();
}

async function unendorse(candidateId) {
    const { error } = await db.from('endorsements')
        .delete()
        .eq('group_id', selectedGroup.id)
        .eq('candidate_id', candidateId)
        .eq('endorser_id', currentUser.id);
    if (error) { showToast(error.message, 'error'); return; }
    showToast('Endorsement removed', 'info');
    await loadCandidatesList();
}

// STATS
// ============================================================
async function loadStatsContent() {
    if (!selectedGroup) return;
    const el = document.getElementById('statsContent');
    if (!el) return;

    const [{ count: memberCount }, { data: members }, { count: txCount }, { count: pendingCount }] = await Promise.all([
        db.from('members').select('*', { count: 'exact', head: true })
            .eq('group_id', selectedGroup.id).eq('status', 'active'),
        db.from('members').select('balance')
            .eq('group_id', selectedGroup.id).eq('status', 'active'),
        db.from('transactions').select('*', { count: 'exact', head: true })
            .eq('group_id', selectedGroup.id),
        db.from('members').select('*', { count: 'exact', head: true })
            .eq('group_id', selectedGroup.id).eq('status', 'pending')
    ]);

    const totalSupply = (members || []).reduce((sum, m) => sum + Number(m.balance), 0);

    // 30-day fee sum (fees from person-to-person transactions)
    const thirtyDaysAgo = new Date(Date.now() - 30 * 86400000).toISOString();
    const { data: recentTx } = await db
        .from('transactions')
        .select('fee, amount, from_user')
        .eq('group_id', selectedGroup.id)
        .gte('created_at', thirtyDaysAgo);

    const fees30 = (recentTx || [])
        .filter(tx => tx.from_user !== null)
        .reduce((sum, tx) => sum + Number(tx.fee), 0);

    const income30 = (recentTx || [])
        .filter(tx => tx.from_user === null)
        .reduce((sum, tx) => sum + Number(tx.amount), 0);

    const sym = selectedGroup.currency_symbol;
    el.innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
            <div class="info-item"><div class="info-label">Active Members</div><div class="info-value">${memberCount || 0}</div></div>
            <div class="info-item"><div class="info-label">Pending Candidates</div><div class="info-value">${pendingCount || 0}</div></div>
            <div class="info-item"><div class="info-label">Total Supply</div><div class="info-value">${sym} ${totalSupply.toFixed(2)}</div></div>

async function createGroup(e) {
    e.preventDefault();
    const name = document.getElementById('newGroupName').value.trim();
    const currencyName = document.getElementById('newCurrencyName').value.trim();
    const currencySymbol = document.getElementById('newCurrencySymbol').value.trim();

    // Generate default constitution
    const defaultConstitution = 'Group Name: ' + name + ' $GROUP_NAME\nCurrency Name: ' + currencyName + ' $CURRENCY_NAME\nCurrency Symbol: ' + currencySymbol + ' $CURRENCY_SYMBOL\nApprove New Member: 100% members $NEW_MEMBER_PERCENTAGE\nApprove Amendment: 100% members $AMENDMENT_PERCENTAGE\nChange Currency Rates: 66% members $CHANGE_CURRENCY_RATES_PERCENTAGE';

    // Create the group
    const { data: group, error: groupError } = await db
        .from('groups')
        .insert({
            name,
            currency_name: currencyName,
            currency_symbol: currencySymbol,
            constitution: defaultConstitution,
            created_by: currentUser.id
        })
        .select()
        .single();

    if (groupError) {
        console.error('createGroup error:', groupError);
        showToast(groupError.message, 'error');
        return;
    }

    // Add creator as active member
    const { error: memberError } = await db
        .from('members')
        .insert({
            group_id: group.id,
            user_id: currentUser.id,
            status: 'active',
            balance: 0
        });

    if (memberError) {
        console.error('createGroup member error:', memberError);
        showToast(memberError.message, 'error');
        return;
    }

    showToast(`Group "${name}" created!`, 'success');
    closeModal();
    await loadMyGroups(group.id);
}

async function castVote(e, voteType) {
    e.preventDefault();
    let value = parseFloat(document.getElementById('voteValue').value);

    // For fee_rate, user enters percentage, store as decimal
    if (voteType === 'fee_rate') {
        value = value / 100;
    }

    // Upsert vote (unique constraint on group_id, user_id, vote_type)
    const { error } = await db.from('votes').upsert({
        group_id: selectedGroup.id,
        user_id: currentUser.id,
        vote_type: voteType,
        value: value
    }, { onConflict: 'group_id,user_id,vote_type' });

    if (error) { showToast(error.message, 'error'); return; }

    closeModal();

    // Auto-tally: check if enough members have voted to apply the change
    const { data: tallyResult } = await db.rpc('compute_tally', {
        p_group_id: selectedGroup.id,
        p_vote_type: voteType
    });

    const label = voteType === 'fee_rate' ? 'Fee Rate' : 'Daily Income';
    if (tallyResult?.applied) {
        // Refresh group data
        const { data: updatedGroup } = await db.from('groups').select('*').eq('id', selectedGroup.id).single();
        if (updatedGroup) {
            selectedGroup = updatedGroup;
            const membership = myGroups.find(m => m.group_id === selectedGroup.id);
            if (membership) membership.groups = updatedGroup;
        }
        const displayVal = voteType === 'fee_rate'
            ? `${(tallyResult.median * 100).toFixed(1)}%`
            : `${selectedGroup.currency_symbol} ${Number(tallyResult.median).toFixed(2)}`;
        showToast(`${label} updated to ${displayVal} (${tallyResult.vote_count}/${tallyResult.active_members} members voted)`, 'success');
    } else {
        showToast(`Vote recorded — ${tallyResult?.vote_count || 0}/${tallyResult?.threshold || '?'} votes needed to apply ${label}`, 'info');
    }

    // Refresh the money tab to show updated rates / "Your vote" line
    if (activeTab === 'money') await renderMoneyTab();
}

// Word-level diff: produces HTML with <ins> and <del> spans
function wordDiff(oldText, newText) {
    const oldWords = oldText.split(/(\s+)/);
    const newWords = newText.split(/(\s+)/);

    // Simple LCS-based diff
    const m = oldWords.length, n = newWords.length;
    // Build LCS table
    const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
    for (let i = 1; i <= m; i++) {
        for (let j = 1; j <= n; j++) {
            if (oldWords[i - 1] === newWords[j - 1]) {
                dp[i][j] = dp[i - 1][j - 1] + 1;
            } else {
                dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
            }
        }
    }

    // Backtrack to build diff
    const result = [];
    let i = m, j = n;
    while (i > 0 || j > 0) {
        if (i > 0 && j > 0 && oldWords[i - 1] === newWords[j - 1]) {
            result.unshift({ type: 'same', text: oldWords[i - 1] });
            i--; j--;
        } else if (j > 0 && (i === 0 || dp[i][j - 1] >= dp[i - 1][j])) {
            result.unshift({ type: 'ins', text: newWords[j - 1] });
            j--;
        } else {
            result.unshift({ type: 'del', text: oldWords[i - 1] });
            i--;
        }
    }

    return result.map(r => {
        const t = esc(r.text);
        if (r.type === 'ins') return `<ins>${t}</ins>`;
        if (r.type === 'del') return `<del>${t}</del>`;
        return t;
    }).join('');
}

// Render constitution text with highlighted tags
function renderConstitution(text) {
    if (!text) return '<em style="color:var(--dark-gray);">No constitution yet.</em>';
    return esc(text).replace(/\$([A-Z_]+)/g,
        '<span class="tag">$$$1</span>');
}

// Parse $AMENDMENT_PERCENTAGE from constitution text (returns 0-1)
function parseAmendmentThreshold(constitutionText) {
    if (!constitutionText) return 1.0; // default 100%
    const match = constitutionText.match(/:\s*(\d+)%\s*members?\s*\$AMENDMENT_PERCENTAGE/i);
    if (match) return parseInt(match[1]) / 100;
    return 1.0;
}

function parseNewMemberThreshold(constitutionText) {
    if (!constitutionText) return 1.0; // default 100%
    const match = constitutionText.match(/:\s*(\d+)%\s*members?\s*\$NEW_MEMBER_PERCENTAGE/i);
    if (match) return parseInt(match[1]) / 100;
    return 1.0;
}

// Load the Constitution content
let _constitutionLoadGen = 0;  // generation counter to prevent stale writes
async function loadConstitutionContent() {
    if (!selectedGroup) return;
    const myGen = ++_constitutionLoadGen;       // claim this generation
    const groupId = selectedGroup.id;           // pin the group id
    const el = document.getElementById('constitutionContent');
    if (!el) return;
    el.innerHTML = '<p style="color:var(--dark-gray);">Loading…</p>';

    try {
        // Refresh group data to get latest constitution
        const { data: freshGroup, error: groupErr } = await db
            .from('groups')
            .select('*')
            .eq('id', groupId)
            .single();

        if (myGen !== _constitutionLoadGen) return;  // stale – a newer call took over

        if (groupErr) {
            console.error('loadConstitution group fetch error:', groupErr);
            el.innerHTML = `<p style="color:var(--red);">Error loading group data: ${esc(groupErr.message)}</p>`;
            return;
        }
        if (freshGroup) {
            selectedGroup = freshGroup;   // safe: we checked generation
        }

        const constitutionHtml = `<div class="constitution-text">${renderConstitution(selectedGroup.constitution)}</div>`;

        // Load active and past amendments in parallel
        const [activeResult, pastResult, memberResult] = await Promise.all([
            db.from('amendments')
                .select('*, proposer:profiles(display_name)')
                .eq('group_id', groupId)
                .eq('status', 'voting')
                .order('created_at', { ascending: false }),
            db.from('amendments')
                .select('*, proposer:profiles(display_name)')
                .eq('group_id', groupId)
                .in('status', ['passed', 'failed', 'withdrawn'])
                .order('resolved_at', { ascending: false })
                .limit(20),
            db.from('members')
                .select('*', { count: 'exact', head: true })
                .eq('group_id', groupId)
                .eq('status', 'active')
        ]);

        if (myGen !== _constitutionLoadGen) return;  // stale

        if (activeResult.error) console.warn('loadConstitution active amendments error:', activeResult.error);
        if (pastResult.error) console.warn('loadConstitution past amendments error:', pastResult.error);

        const activeAmendments = activeResult.data;
        const pastAmendments = pastResult.data;
        const activeMembers = memberResult.count;

        // Get vote counts for all amendments we're showing
        const allAmendmentIds = [
            ...(activeAmendments || []).map(a => a.id),
            ...(pastAmendments || []).map(a => a.id)
        ];

        let votesMap = {};
        let myVotesMap = {};
        if (allAmendmentIds.length > 0) {
            const { data: votes } = await db
                .from('amendment_votes')
                .select('amendment_id, user_id, vote')
                .in('amendment_id', allAmendmentIds);

            if (myGen !== _constitutionLoadGen) return;  // stale

            (votes || []).forEach(v => {
                if (!votesMap[v.amendment_id]) votesMap[v.amendment_id] = { approve: 0, reject: 0 };
                if (v.vote) votesMap[v.amendment_id].approve++;
                else votesMap[v.amendment_id].reject++;
                if (v.user_id === currentUser.id) myVotesMap[v.amendment_id] = v.vote;
            });
        }

        let html = constitutionHtml;

        // Propose button
        html += `<div style="margin:1rem 0;">
            <button class="btn btn-primary" onclick="showModal('proposeAmendment')">Propose an Amendment</button>
        </div>`;

        // Active amendments
        if (activeAmendments && activeAmendments.length > 0) {
            html += `<h4 style="margin:1.5rem 0 0.5rem;color:var(--accent-color);">Active Amendments</h4>`;
            html += activeAmendments.map(a => renderAmendmentCard(a, votesMap, myVotesMap, activeMembers)).join('');
        }

        // Past amendments
        if (pastAmendments && pastAmendments.length > 0) {
            html += `<h4 style="margin:1.5rem 0 0.5rem;color:var(--accent-color);">Amendment History</h4>`;
            html += pastAmendments.map(a => renderAmendmentCard(a, votesMap, myVotesMap, activeMembers)).join('');
        }

        if (myGen !== _constitutionLoadGen) return;  // final stale check before DOM write
        el.innerHTML = html;
    } catch (e) {
        console.error('loadConstitution error:', e);
        if (myGen === _constitutionLoadGen) {
            el.innerHTML = `<p style="color:var(--red);">Failed to load constitution: ${esc(e.message || e)}</p>`;
        }
    }
}

function renderAmendmentCard(a, votesMap, myVotesMap, activeMemberCount) {
    const votes = votesMap[a.id] || { approve: 0, reject: 0 };
    const myVote = myVotesMap[a.id];
    const total = activeMemberCount || 1;
    const pct = total > 0 ? (votes.approve / total * 100) : 0;
    const thresholdPct = (a.threshold * 100);
    const now = new Date();
    const expires = new Date(a.expires_at);
    const isExpired = expires <= now;
    const timeLeft = isExpired ? 'Expired' : formatTimeLeft(expires - now);

    let diffHtml = wordDiff(a.old_text || '', a.new_text || '');

    let actions = '';
    if (a.status === 'voting') {
        if (isExpired) {
            actions = `<button class="btn btn-primary btn-small" onclick="resolveAmendment('${a.id}')">Resolve Vote</button>`;
        } else {
            const approveClass = myVote === true ? 'btn-success' : 'btn-outline';
            const rejectClass = myVote === false ? 'btn-danger' : 'btn-outline';
            actions = `
                <button class="btn ${approveClass} btn-small" onclick="voteAmendment('${a.id}', true)"
                    ${myVote === true ? 'disabled' : ''}>Approve${myVote === true ? 'd' : ''}</button>
                <button class="btn ${rejectClass} btn-small" onclick="voteAmendment('${a.id}', false)"
                    ${myVote === false ? 'disabled' : ''}>Reject${myVote === false ? 'ed' : ''}</button>
            `;
            if (a.proposed_by === currentUser.id) {
                actions += ` <button class="btn btn-secondary btn-small" onclick="withdrawAmendment('${a.id}')">Withdraw</button>`;
            }
        }
    }

    return `<div class="amendment-card ${a.status}">
        <div class="amendment-header">
            <span class="amendment-title">${esc(a.title)}</span>
            <span class="amendment-status ${a.status}">${a.status}</span>
        </div>
        <div class="amendment-meta">
            Proposed by ${esc(a.proposer?.display_name || 'Unknown')}
            &middot; ${a.status === 'voting' ? timeLeft : (a.resolved_at ? new Date(a.resolved_at).toLocaleDateString() : '')}
        </div>
        <div class="vote-bar">
            <span style="font-size:0.8rem;font-weight:600;">${votes.approve}/${total}</span>
            <div class="vote-bar-track">
                <div class="vote-bar-fill" style="width:${pct}%"></div>
                <div class="vote-bar-threshold" style="left:${thresholdPct}%" title="Threshold: ${thresholdPct}%"></div>
            </div>
            <span style="font-size:0.75rem;color:var(--dark-gray);">need ${thresholdPct}%</span>
        </div>
        <details style="margin:0.5rem 0;">
            <summary style="cursor:pointer;font-size:0.85rem;color:var(--primary-color);font-weight:500;">Show changes</summary>
            <div class="diff-display" style="margin-top:0.5rem;">${diffHtml}</div>
        </details>
        ${actions ? `<div style="display:flex;gap:0.5rem;margin-top:0.5rem;">${actions}</div>` : ''}
    </div>`;
}

function formatTimeLeft(ms) {
    const days = Math.floor(ms / 86400000);
    const hours = Math.floor((ms % 86400000) / 3600000);
    if (days > 0) return `${days}d ${hours}h left`;
    const mins = Math.floor((ms % 3600000) / 60000);
    if (hours > 0) return `${hours}h ${mins}m left`;
    return `${mins}m left`;
}

// Live diff preview in the propose amendment modal
function updateAmendmentPreview() {
    const oldText = selectedGroup?.constitution || '';
    const newText = document.getElementById('amendmentEditor').value;
    const preview = document.getElementById('amendmentDiffPreview');
    if (oldText === newText) {
        preview.innerHTML = '<span style="color:var(--dark-gray);">No changes yet.</span>';
    } else {
        preview.innerHTML = wordDiff(oldText, newText);
    }
}

async function submitAmendment() {
    if (!selectedGroup) return;
    const title = document.getElementById('amendmentTitle').value.trim();
    const newText = document.getElementById('amendmentEditor').value;
    const oldText = selectedGroup.constitution || '';

    if (!title) { showToast('Please enter a title for the amendment', 'error'); return; }
    if (newText === oldText) { showToast('No changes detected in the constitution', 'error'); return; }

    const threshold = parseAmendmentThreshold(oldText);

    const { error } = await db.from('amendments').insert({
        group_id: selectedGroup.id,
        proposed_by: currentUser.id,
        title,
        old_text: oldText,
        new_text: newText,
        threshold
    });

    if (error) { showToast(error.message, 'error'); return; }

    // Log the event for realtime notifications
    await db.rpc('log_group_event', {
        p_group_id: selectedGroup.id,
        p_event_type: 'amendment_proposed',
        p_summary: 'Amendment proposed: ' + title,
        p_metadata: { title }
    });

    showToast('Amendment proposed! Members have 7 days to vote.', 'success');
    closeModal();
    if (activeTab === 'constitution') await loadConstitutionContent();
}

async function voteAmendment(amendmentId, approve) {
    const { error } = await db.from('amendment_votes').upsert({
        amendment_id: amendmentId,
        user_id: currentUser.id,
        vote: approve
    }, { onConflict: 'amendment_id,user_id' });

    if (error) { showToast(error.message, 'error'); return; }

    // After an approval vote, check if threshold is now met
    if (approve) {
        const { data, error: resolveError } = await db.rpc('resolve_amendment', { p_amendment_id: amendmentId });
        if (!resolveError && data?.passed) {
            showToast(`Amendment passed! (${data.approve_count}/${data.active_members} approved, ${data.ratio}% ≥ ${data.threshold}% needed)`, 'success');
            // Refresh group data since constitution may have changed
            const { data: freshGroup } = await db.from('groups').select('*').eq('id', selectedGroup.id).single();
            if (freshGroup) {
                selectedGroup = freshGroup;
                const membership = myGroups.find(m => m.group_id === selectedGroup.id);
                if (membership) membership.groups = freshGroup;
                renderGroupList();
            }
            await loadConstitutionContent();
            return;
        }
    }

    showToast(approve ? 'Voted to approve' : 'Voted to reject', 'info');
    await loadConstitutionContent();
}

async function resolveAmendment(amendmentId) {
    const { data, error } = await db.rpc('resolve_amendment', { p_amendment_id: amendmentId });
    if (error) { showToast(error.message, 'error'); return; }

    if (data?.resolved === false) {
        showToast(`Not enough votes yet (${data.approve_count}/${data.active_members}, need ${data.threshold}%)`, 'info');
    } else if (data?.passed) {
        showToast(`Amendment passed! (${data.approve_count}/${data.active_members} approved, ${data.ratio}% ≥ ${data.threshold}% needed)`, 'success');
        const { data: freshGroup } = await db.from('groups').select('*').eq('id', selectedGroup.id).single();
        if (freshGroup) {
            selectedGroup = freshGroup;
            const membership = myGroups.find(m => m.group_id === selectedGroup.id);
            if (membership) membership.groups = freshGroup;
            renderGroupList();
        }
    } else {
        showToast(`Amendment failed. (${data.approve_count}/${data.active_members} approved, ${data.ratio}% < ${data.threshold}% needed)`, 'error');
    }
    await loadConstitutionContent();
}

async function withdrawAmendment(amendmentId) {
    console.log('withdrawAmendment called with:', amendmentId);
    try {
        const { data, error } = await db
            .from('amendments')
            .update({ status: 'withdrawn' })
            .eq('id', amendmentId)
            .select()
            .single();

        console.log('withdrawAmendment result:', { data, error });
        if (error) {
            console.error('withdrawAmendment error:', error);
            showToast(error.message, 'error');
            return;
        }
        showToast('Amendment withdrawn', 'info');
        await loadConstitutionContent();
    } catch (e) {
        console.error('withdrawAmendment exception:', e);
        showToast('Error withdrawing amendment: ' + e.message, 'error');
    }
}

// ============================================================
// REALTIME & ACTIVITY LOG
// ============================================================

function subscribeToGroup(groupId) {
    // Unsubscribe from previous group channel
    if (groupChannel) {
        db.removeChannel(groupChannel);
        groupChannel = null;
    }

    groupChannel = db.channel(`group-${groupId}`)
        .on('postgres_changes',
            { event: 'INSERT', schema: 'public', table: 'group_events',
              filter: `group_id=eq.${groupId}` },
            (payload) => handleGroupEvent(payload.new)
        )
        .subscribe();
}

async function handleGroupEvent(event) {
    if (!event || !selectedGroup || event.group_id !== selectedGroup.id) return;

    // Don't toast events we triggered ourselves
    const isMine = event.actor_id === currentUser?.id;

    // Show toast to other members (not the actor)
    if (!isMine) {
        showToast(event.summary, 'info');
    }

    // Prepend to the activity log UI (skip transactions — they have their own panel)
    if (event.event_type !== 'payment_received') {
        const logEl = document.getElementById('activityContent');
        if (logEl) {
            const itemHtml = renderActivityItem(event, true);
            logEl.insertAdjacentHTML('afterbegin', itemHtml);

            // Trim to 20 items
            const items = logEl.querySelectorAll('.activity-item');
            if (items.length > 20) {
                for (let i = 20; i < items.length; i++) items[i].remove();
            }
        }
    }

    // Refresh relevant UI based on event type
    switch (event.event_type) {
        case 'rate_change': {
            // Re-fetch group data to update money tab
            const { data: updatedGroup } = await db.from('groups').select('*').eq('id', selectedGroup.id).single();
            if (updatedGroup) {
                selectedGroup = updatedGroup;
                const membership = myGroups.find(m => m.group_id === selectedGroup.id);
                if (membership) membership.groups = updatedGroup;
            }
            if (activeTab === 'money') await renderMoneyTab();
            break;
        }
        case 'member_joined':
        case 'member_sponsored': {
            // Refresh member count / candidates
            await loadMyGroups();
            if (activeTab === 'members') await renderMembersTab();
            break;
        }
        case 'payment_received': {
            // Refresh balance if we are the recipient
            const toUser = event.metadata?.to_user;
            if (toUser === currentUser?.id) {
                const membership = myGroups.find(m => m.group_id === selectedGroup.id);
                if (membership) {
                    const { data: myMember } = await db.from('members').select('balance')
                        .eq('group_id', selectedGroup.id).eq('user_id', currentUser.id).single();
                    if (myMember) {
                        membership.balance = myMember.balance;
                        const balEl = document.getElementById('balanceAmount');
                        if (balEl) balEl.textContent =
                            `${selectedGroup.currency_symbol} ${Number(myMember.balance).toFixed(2)}`;
                    }
                }
                if (activeTab === 'money') await loadTransactions();
            }
            break;
        }
        case 'amendment_proposed':
        case 'amendment_passed':
        case 'amendment_failed': {
            if (activeTab === 'constitution') await loadConstitutionContent();
            // Amendment pass may have changed group settings
            if (event.event_type === 'amendment_passed') {
                const { data: freshGroup } = await db.from('groups').select('*').eq('id', selectedGroup.id).single();
                if (freshGroup) {
                    selectedGroup = freshGroup;
                    const membership = myGroups.find(m => m.group_id === selectedGroup.id);
                    if (membership) membership.groups = freshGroup;
                    renderGroupList();
                }
                if (activeTab === 'money') await renderMoneyTab();
            }
            break;
        }
    }
}

async function loadActivityLog() {
    if (!selectedGroup) return;

    const { data, error } = await db
        .from('group_events')
        .select('*')
        .eq('group_id', selectedGroup.id)
        .neq('event_type', 'payment_received')
        .order('created_at', { ascending: false })
        .limit(20);

    const logEl = document.getElementById('activityContent');
    if (error || !data || data.length === 0) {
        logEl.innerHTML = '<p style="color:var(--dark-gray);font-size:0.85rem;">No activity yet.</p>';
        return;
    }

    logEl.innerHTML = data.map(e => renderActivityItem(e, false)).join('');
}

function renderActivityItem(event, highlight) {
    const ago = formatTimeAgo(new Date(event.created_at));
    return `<div class="activity-item${highlight ? ' highlight' : ''}">
        <span class="activity-time">${esc(ago)}</span>
        <span class="activity-summary">${esc(event.summary)}</span>
    </div>`;
}

function formatTimeAgo(date) {
    const seconds = Math.floor((Date.now() - date.getTime()) / 1000);
    if (seconds < 60) return 'just now';
    const mins = Math.floor(seconds / 60);
    if (mins < 60) return `${mins}m ago`;
    const hours = Math.floor(mins / 60);
    if (hours < 24) return `${hours}h ago`;
    const days = Math.floor(hours / 24);
    if (days < 30) return `${days}d ago`;
    return date.toLocaleDateString();
}

// ============================================================
// UTILITIES
// ============================================================
function esc(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

function showToast(message, type = 'info') {
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 4000);
}

// ============================================================
// BOOT
// ============================================================
init();
