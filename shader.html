<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ShaderToy Wrapper</title>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="glcanvas"></canvas>

<script id="vertShader" type="x-shader/x-vertex">
attribute vec2 position;
varying vec2 vUv;
void main() {
  vUv = (position + 1.0) * 0.5;
  gl_Position = vec4(position, 0.0, 1.0);
}
</script>

<script id="fragShader" type="x-shader/x-fragment">
precision highp float;

uniform vec3 iResolution;
uniform float iTime;
uniform int iFrame;
uniform sampler2D iChannel0;

float hash1(float n) {
    return fract(sin(n)*138.5453123);
}

float random() {
    return hash1(sin(iTime));
}

float random(in vec2 fragCoord) {
    return hash1(hash1(fragCoord.x*13.0 + hash1(fragCoord.y*71.1)) + sin(iTime));
}

vec3 randomRGBColor(in vec2 fragCoord) {
    float r = random(fragCoord);
    float g = random(fragCoord * 1.4);
    float b = random(fragCoord * 1.1);
    return vec3(r, g, b);
}

vec4 Cell(in ivec2 p) {
    ivec2 r = ivec2(textureSize(iChannel0, 0));
    p = (p + r) % r;
    return texelFetch(iChannel0, p, 0);
}

void mainImage(out vec4 fragColor, in vec2 fragCoord) {
    ivec2 px = ivec2(fragCoord);
    if (iFrame == 0) {
        fragColor = vec4(randomRGBColor(fragCoord), 1.0);
    } else {
        fragColor = Cell(px);
    }

    float changeChance = 0.5;
    if (random(fragCoord) < changeChance) {
        int neighbor_i, neighbor_j;
        float random_x = random(fragCoord + vec2(117, 71));
        if (random_x < 0.33333) neighbor_i = -1;
        else if (random_x < 0.66666) neighbor_i = 0;
        else neighbor_i = 1;

        float random_y = random(fragCoord + vec2(67, 18));
        if (random_y < 0.33333) neighbor_j = -1;
        else if (random_y < 0.66666) neighbor_j = 0;
        else neighbor_j = 1;

        fragColor = Cell(px + ivec2(neighbor_i, neighbor_j));
    }
}

void main() {
    vec4 color;
    mainImage(color, gl_FragCoord.xy);
    gl_FragColor = color;
}
</script>

<script>
const canvas = document.getElementById('glcanvas');
const gl = canvas.getContext('webgl');
const dpr = window.devicePixelRatio || 1;
canvas.width = window.innerWidth * dpr;
canvas.height = window.innerHeight * dpr;
canvas.style.width = window.innerWidth + "px";
canvas.style.height = window.innerHeight + "px";

function createShader(type, source) {
  const s = gl.createShader(type);
  gl.shaderSource(s, source);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    throw new Error("Shader compile error");
  }
  return s;
}

function createProgram(vsSource, fsSource) {
  const vs = createShader(gl.VERTEX_SHADER, vsSource);
  const fs = createShader(gl.FRAGMENT_SHADER, fsSource);
  const prog = gl.createProgram();
  gl.attachShader(prog, vs);
  gl.attachShader(prog, fs);
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error(gl.getProgramInfoLog(prog));
    throw new Error("Program link error");
  }
  return prog;
}

function createTextureAndFBO(width, height) {
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, width, height, 0,
                gl.RGBA, gl.UNSIGNED_BYTE, null);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.REPEAT);

  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0,
                          gl.TEXTURE_2D, tex, 0);
  return {texture: tex, fbo: fbo};
}

const program = createProgram(
  document.getElementById("vertShader").textContent,
  document.getElementById("fragShader").textContent
);

const positionLoc = gl.getAttribLocation(program, "position");
const iResolutionLoc = gl.getUniformLocation(program, "iResolution");
const iTimeLoc = gl.getUniformLocation(program, "iTime");
const iFrameLoc = gl.getUniformLocation(program, "iFrame");
const iChannel0Loc = gl.getUniformLocation(program, "iChannel0");

const buffer = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
  -1, -1, 1, -1, -1, 1, 1, 1
]), gl.STATIC_DRAW);

const texA = createTextureAndFBO(canvas.width, canvas.height);
const texB = createTextureAndFBO(canvas.width, canvas.height);
let ping = texA, pong = texB;

let start = performance.now();
let frame = 0;

function render() {
  gl.useProgram(program);
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.bindFramebuffer(gl.FRAMEBUFFER, pong.fbo);

  gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
  gl.enableVertexAttribArray(positionLoc);
  gl.vertexAttribPointer(positionLoc, 2, gl.FLOAT, false, 0, 0);

  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, ping.texture);
  gl.uniform1i(iChannel0Loc, 0);

  gl.uniform3f(iResolutionLoc, canvas.width / dpr, canvas.height / dpr, 1.0);
  gl.uniform1f(iTimeLoc, (performance.now() - start) / 1000.0);
  gl.uniform1i(iFrameLoc, frame);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  // Blit to screen
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.bindTexture(gl.TEXTURE_2D, pong.texture);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  [ping, pong] = [pong, ping];
  frame++;
  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
